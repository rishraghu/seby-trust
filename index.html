<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seby — Trust Points</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── BASE THEME (green) ── */
:root {
  --bg:         #0b0f0b;
  --surface:    #111911;
  --surface2:   #162016;
  --border:     #1e2e1e;
  --primary:    #22c55e;
  --primary-dim:#166534;
  --glow:       rgba(34,197,94,0.3);
  --acid:       #a3e635;
  --gold:       #eab308;
  --gold-dim:   #713f12;
  --red:        #ef4444;
  --red-dim:    #7f1d1d;
  --red-glow:   rgba(239,68,68,0.25);
  --text:       #f0fdf0;
  --muted:      #4b6650;
  --header-bg:  #111911;
  --score-pos:  #22c55e;
  --score-glow: rgba(34,197,94,0.35);
  --scales-color: rgba(34,197,94,0.04);
}

/* ── GOLDEN DRAGON THEME ── */
body.golden {
  --bg:         #0d0900;
  --surface:    #1a1000;
  --surface2:   #221500;
  --border:     #3d2800;
  --primary:    #eab308;
  --primary-dim:#713f12;
  --glow:       rgba(234,179,8,0.4);
  --acid:       #fde047;
  --gold:       #fde047;
  --gold-dim:   #92400e;
  --text:       #fefce8;
  --muted:      #92620a;
  --header-bg:  #1a1000;
  --score-pos:  #fde047;
  --score-glow: rgba(253,224,71,0.5);
  --scales-color: rgba(234,179,8,0.06);
}
body.golden .hero-sub { color: #fde047; }
body.golden .trust-btn.plus { border-color: #92400e; color: #eab308; }
body.golden .trust-btn.plus:active { background: #92400e; }
body.golden .day-cell.active { border-color: #fde047; }
body.golden .cal-dot { background: #fde047; }
body.golden .tally-chip.plus { color: #eab308; border-color: #92400e; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 0 0 40px;
  transition: background 0.8s;
}

.app { width: 100%; max-width: 440px; }

/* ── HEADER ── */
.header {
  position: relative;
  overflow: hidden;
  padding: 24px 24px 18px;
  text-align: center;
  background: var(--header-bg);
  border-bottom: 2px solid var(--border);
  transition: background 0.8s, border-color 0.8s;
}
.header-scales {
  position: absolute; inset: 0;
  background-image:
    repeating-linear-gradient(120deg, transparent 0px, transparent 18px, var(--scales-color) 18px, var(--scales-color) 20px),
    repeating-linear-gradient(60deg,  transparent 0px, transparent 18px, var(--scales-color) 18px, var(--scales-color) 20px);
  pointer-events: none;
  transition: opacity 0.8s;
}

/* ── NINJA AVATAR STAGE SYSTEM ── */
.ninja-stage {
  position: relative;
  display: inline-block;
  line-height: 1;
  margin-bottom: 4px;
}

/* The base lego ninja character — built from CSS + emoji layers */
.ninja-body {
  font-size: 72px;
  display: block;
  position: relative;
  z-index: 2;
  animation: bob 3.5s ease-in-out infinite;
  transition: filter 0.6s;
}
@keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

/* Aura ring behind ninja */
.ninja-aura {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  opacity: 0;
  transition: all 0.6s;
  pointer-events: none;
  z-index: 1;
}

/* Fire particles above/around ninja */
.ninja-fx {
  position: absolute;
  top: -8px; left: 50%;
  transform: translateX(-50%);
  font-size: 0px;
  opacity: 0;
  transition: font-size 0.4s, opacity 0.4s;
  z-index: 3;
  pointer-events: none;
  white-space: nowrap;
}

/* Wings layer */
.ninja-wings {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -44%);
  font-size: 0px;
  opacity: 0;
  transition: font-size 0.5s, opacity 0.5s;
  z-index: 1;
  pointer-events: none;
}

/* Crown layer */
.ninja-crown {
  position: absolute;
  top: -12px; left: 50%;
  transform: translateX(-50%);
  font-size: 0px;
  opacity: 0;
  transition: font-size 0.4s, opacity 0.4s;
  z-index: 4;
  pointer-events: none;
}

/* Stage 0 (0 pts): plain ninja */
/* Stage 1 (5 pts): green fire halo */
.stage-1 .ninja-body  { filter: drop-shadow(0 0 12px rgba(34,197,94,0.7)); }
.stage-1 .ninja-fx    { font-size: 20px; opacity: 1; }
.stage-1 .ninja-aura  { width: 90px; height: 90px; background: radial-gradient(circle, rgba(34,197,94,0.2) 0%, transparent 70%); opacity: 1; }

/* Stage 2 (10 pts): bigger fire + glow */
.stage-2 .ninja-body  { filter: drop-shadow(0 0 20px rgba(34,197,94,0.9)) drop-shadow(0 0 40px rgba(34,197,94,0.4)); }
.stage-2 .ninja-fx    { font-size: 28px; opacity: 1; animation: flicker 1.2s ease-in-out infinite; }
.stage-2 .ninja-aura  { width: 110px; height: 110px; background: radial-gradient(circle, rgba(34,197,94,0.25) 0%, transparent 70%); opacity: 1; animation: pulse-aura 2s ease-in-out infinite; }

/* Stage 3 (15 pts): wings + golden fire */
.stage-3 .ninja-body  { filter: drop-shadow(0 0 20px rgba(234,179,8,0.8)) drop-shadow(0 0 40px rgba(34,197,94,0.4)); }
.stage-3 .ninja-fx    { font-size: 30px; opacity: 1; animation: flicker 0.9s ease-in-out infinite; }
.stage-3 .ninja-wings { font-size: 52px; opacity: 0.85; animation: wings-flap 2s ease-in-out infinite; }
.stage-3 .ninja-aura  { width: 130px; height: 130px; background: radial-gradient(circle, rgba(234,179,8,0.2) 0%, rgba(34,197,94,0.1) 50%, transparent 70%); opacity: 1; animation: pulse-aura 1.5s ease-in-out infinite; }

/* Stage 4 (20 pts): GOLDEN DRAGON — complete transformation */
.stage-4 .ninja-body  { filter: drop-shadow(0 0 30px rgba(253,224,71,1)) drop-shadow(0 0 60px rgba(234,179,8,0.6)) sepia(0.5) saturate(2) hue-rotate(15deg) brightness(1.3); animation: bob 2s ease-in-out infinite, gold-pulse 1.5s ease-in-out infinite; }
.stage-4 .ninja-fx    { font-size: 34px; opacity: 1; animation: flicker 0.6s ease-in-out infinite; }
.stage-4 .ninja-wings { font-size: 64px; opacity: 1; animation: wings-flap 1.2s ease-in-out infinite; }
.stage-4 .ninja-crown { font-size: 28px; opacity: 1; animation: crown-spin 3s linear infinite; }
.stage-4 .ninja-aura  { width: 160px; height: 160px; background: radial-gradient(circle, rgba(253,224,71,0.35) 0%, rgba(234,179,8,0.15) 50%, transparent 70%); opacity: 1; animation: pulse-aura 1s ease-in-out infinite; }

@keyframes flicker { 0%,100%{transform:translateX(-50%) scaleY(1)} 50%{transform:translateX(-50%) scaleY(1.15)} }
@keyframes wings-flap { 0%,100%{transform:translate(-50%,-44%) scaleY(1)} 50%{transform:translate(-50%,-44%) scaleY(0.92)} }
@keyframes pulse-aura { 0%,100%{opacity:0.7} 50%{opacity:1} }
@keyframes gold-pulse { 0%,100%{filter:drop-shadow(0 0 30px rgba(253,224,71,1)) drop-shadow(0 0 60px rgba(234,179,8,0.6)) sepia(0.5) saturate(2) hue-rotate(15deg) brightness(1.3)} 50%{filter:drop-shadow(0 0 40px rgba(253,224,71,1)) drop-shadow(0 0 80px rgba(234,179,8,0.9)) sepia(0.8) saturate(3) hue-rotate(20deg) brightness(1.5)} }
@keyframes crown-spin { 0%{transform:translateX(-50%) rotate(-8deg)} 50%{transform:translateX(-50%) rotate(8deg)} 100%{transform:translateX(-50%) rotate(-8deg)} }

.hero-name {
  font-family: 'Bangers', cursive;
  font-size: 52px;
  letter-spacing: 6px;
  color: var(--gold);
  text-shadow: 0 2px 0 #000, 0 0 24px rgba(234,179,8,0.4);
  line-height: 1;
  margin-top: 2px;
  transition: color 0.6s, text-shadow 0.6s;
}
.hero-sub {
  font-family: 'Bangers', cursive;
  font-size: 17px;
  letter-spacing: 4px;
  color: var(--acid);
  opacity: 0.9;
  margin-top: 2px;
  transition: color 0.6s;
}

/* ── SCORE BLOCK ── */
.score-block { padding: 28px 24px 20px; text-align: center; background: var(--bg); transition: background 0.8s; }
.score-eyebrow { font-size: 10px; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.score-num {
  font-family: 'Bangers', cursive;
  font-size: 120px;
  line-height: 0.9;
  transition: color 0.4s, text-shadow 0.4s;
  display: block;
}
.score-num.pos  { color: var(--score-pos);  text-shadow: 0 0 60px var(--score-glow), 0 0 20px var(--score-glow); }
.score-num.neg  { color: var(--red);         text-shadow: 0 0 60px var(--red-glow), 0 0 20px var(--red-glow); }
.score-num.zero { color: var(--gold);         text-shadow: 0 0 30px rgba(234,179,8,0.2); }

.score-tally { display:flex; justify-content:center; gap:20px; margin-top:10px; }
.tally-chip { display:flex; align-items:center; gap:5px; background:var(--surface2); border:1.5px solid var(--border); border-radius:20px; padding:4px 12px; font-size:13px; font-weight:900; transition: background 0.6s, border-color 0.6s; }
.tally-chip.plus  { color:var(--primary); border-color:var(--primary-dim); }
.tally-chip.minus { color:var(--red);     border-color:var(--red-dim); }

.level-pill { display:inline-block; margin-top:14px; background:var(--gold-dim); border:2px solid var(--gold); color:var(--gold); font-family:'Bangers',cursive; font-size:15px; letter-spacing:2px; padding:4px 18px; border-radius:100px; transition: all 0.6s; }

/* ── BIG BUTTONS ── */
.btn-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:0 24px 24px; background:var(--bg); transition:background 0.8s; }
.trust-btn { height:100px; border-radius:16px; border:3px solid; font-family:'Bangers',cursive; font-size:60px; line-height:1; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; transition:transform 0.1s,background 0.15s; background:transparent; user-select:none; -webkit-tap-highlight-color:transparent; }
.trust-btn span { font-family:'Nunito',sans-serif; font-size:10px; font-weight:900; letter-spacing:2px; text-transform:uppercase; margin-top:-2px; }
.trust-btn.plus  { border-color:var(--primary-dim); color:var(--primary); }
.trust-btn.minus { border-color:var(--red-dim);     color:var(--red); }
.trust-btn.plus:active  { background:var(--primary-dim); transform:scale(0.95); }
.trust-btn.minus:active { background:var(--red-dim);     transform:scale(0.95); }

/* ── DIVIDER ── */
.divider { height:2px; margin:0 24px; background:var(--border); border-radius:2px; transition:background 0.6s; }

/* ── WEEK STRIP ── */
.week-label { padding:18px 24px 10px; font-size:10px; font-weight:900; letter-spacing:3px; text-transform:uppercase; color:var(--muted); background:var(--bg); transition:background 0.8s; }
.week-strip { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; padding:0 24px 24px; background:var(--bg); transition:background 0.8s; }
.day-cell { background:var(--surface2); border:2px solid var(--border); border-radius:10px; padding:8px 4px 6px; text-align:center; cursor:pointer; transition:border-color 0.2s,background 0.6s; position:relative; }
.day-cell.active  { border-color:var(--acid); }
.day-cell.pos     { border-color:var(--primary-dim); }
.day-cell.neg     { border-color:var(--red-dim); }
.day-cell.active.pos { border-color:var(--primary); }
.day-cell.active.neg { border-color:var(--red); }
.day-name { font-size:9px; font-weight:900; letter-spacing:1px; text-transform:uppercase; color:var(--muted); }
.day-val  { font-family:'Bangers',cursive; font-size:20px; line-height:1.1; margin-top:2px; }
.day-val.pos  { color:var(--primary); }
.day-val.neg  { color:var(--red); }
.day-val.zero { color:var(--border); }
.cal-dot { width:5px; height:5px; border-radius:50%; background:var(--acid); margin:3px auto 0; transition:background 0.6s; }

/* ── CALENDAR EVENTS ── */
.cal-section { padding:0 24px 20px; display:none; background:var(--bg); transition:background 0.8s; }
.cal-section.show { display:block; }
.cal-event { display:flex; align-items:center; gap:12px; background:var(--surface2); border:2px solid #1e3a5f; border-radius:12px; padding:10px 14px; margin-bottom:8px; }
.cal-icon { font-size:24px; }
.cal-name { font-size:14px; font-weight:900; color:#7dd3fc; }
.cal-time { font-size:11px; color:#4a7fa0; font-weight:800; margin-top:1px; }

/* ── UNLOCKS ── */
.unlocks-wrap { background:var(--bg); transition:background 0.8s; padding-bottom:4px; }
.unlocks-label { padding:6px 24px 12px; font-size:10px; font-weight:900; letter-spacing:3px; text-transform:uppercase; color:var(--muted); }
.unlocks-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:0 24px 24px; }
.unlock-card { background:var(--surface2); border:2px solid var(--border); border-radius:12px; padding:14px 10px; text-align:center; position:relative; transition:border-color 0.3s,background 0.6s; overflow:hidden; }
.unlock-card.earned { border-color:var(--gold); background:#1c1600; }
.unlock-card.earned .lock-veil { display:none; }
.lock-veil { position:absolute; inset:0; background:rgba(0,0,0,0.6); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:28px; }
.unlock-icon { font-size:34px; }
.unlock-name { font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:0.5px; color:#555; margin-top:5px; }
.unlock-card.earned .unlock-name { color:var(--gold); }
.unlock-pts { font-family:'Bangers',cursive; font-size:13px; color:#333; margin-top:2px; letter-spacing:1px; }
.unlock-card.earned .unlock-pts { color:var(--primary); font-size:12px; letter-spacing:0; }
.unlock-progress { font-family:'Bangers',cursive; font-size:13px; color:var(--muted); margin-top:2px; letter-spacing:1px; }

/* ── RESET ── */
.reset-row { padding:0 24px 8px; background:var(--bg); transition:background 0.8s; }
.reset-btn { width:100%; background:transparent; border:2px solid var(--border); color:var(--muted); font-family:'Bangers',cursive; font-size:16px; letter-spacing:3px; padding:10px; border-radius:10px; cursor:pointer; transition:border-color 0.2s,color 0.2s; }
.reset-btn:active { border-color:var(--red); color:var(--red); }
.footer-txt { text-align:center; font-size:10px; font-weight:900; letter-spacing:3px; text-transform:uppercase; color:var(--border); padding:12px 0 0; background:var(--bg); transition:background 0.8s; }

/* ── DRAGON UNLOCK FLASH ── */
@keyframes dragon-flash {
  0%   { opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: 1; }
  100% { opacity: 0; }
}
.dragon-overlay {
  position: fixed; inset: 0;
  background: radial-gradient(circle, rgba(253,224,71,0.9) 0%, rgba(234,179,8,0.6) 40%, transparent 70%);
  pointer-events: none;
  opacity: 0;
  z-index: 999;
}
.dragon-overlay.flash { animation: dragon-flash 1.5s ease forwards; }
</style>
</head>
<body>
<div class="dragon-overlay" id="dragonOverlay"></div>
<div class="app">

  <!-- HEADER -->
  <div class="header" id="mainHeader">
    <div class="header-scales"></div>
    <!-- NINJA AVATAR -->
    <div class="ninja-stage stage-0" id="ninjaStage">
      <div class="ninja-aura"></div>
      <div class="ninja-wings"></div>
      <span class="ninja-fx">🔥🔥🔥</span>
      <span class="ninja-crown">✨</span>
      <span class="ninja-body" id="ninjaBody">🥷</span>
    </div>
    <div class="hero-name" id="heroName">SEBY</div>
    <div class="hero-sub" id="heroSub">THE GREEN NINJA</div>
  </div>

  <!-- SCORE -->
  <div class="score-block">
    <div class="score-eyebrow">Weekly Trust Points</div>
    <span class="score-num zero" id="scoreNum">0</span>
    <div class="score-tally">
      <div class="tally-chip plus"  id="tallyPlus">▲ 0 earned</div>
      <div class="tally-chip minus" id="tallyMinus">▼ 0 lost</div>
    </div>
    <div class="level-pill" id="levelPill">⚡ Level 1 Ninja</div>
  </div>

  <!-- BUTTONS -->
  <div class="btn-row">
    <div class="trust-btn minus" onclick="tap(-1)">−<span>Trust Lost</span></div>
    <div class="trust-btn plus"  onclick="tap(+1)">+<span>Trust Earned</span></div>
  </div>

  <div class="divider"></div>

  <!-- WEEK STRIP -->
  <div class="week-label">This Week</div>
  <div class="week-strip" id="weekStrip"></div>

  <!-- CALENDAR EVENTS -->
  <div class="cal-section" id="calSection"></div>

  <div class="divider"></div>

  <!-- UNLOCKS -->
  <div class="unlocks-wrap">
    <div class="unlocks-label">Ninja Unlocks</div>
    <div class="unlocks-grid" id="unlocksGrid"></div>
  </div>

  <div class="reset-row">
    <button class="reset-btn" onclick="resetWeek()">↺ Reset Week</button>
  </div>
  <div class="footer-txt">Spinjitzu Training In Progress</div>

</div>
<script>
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

const CALENDAR = {
  1: [{ icon:'🦾', name:'OT — Monique',    sub:'Occupational Therapy' }],
  3: [{ icon:'🗣️', name:'Speech Therapy',  sub:'Speech & Literacy' }],
  4: [{ icon:'⚽', name:'Soccer Training', sub:'Get your boots ready!' }],
  5: [{ icon:'⚽', name:'Soccer Match',    sub:"Game day — let's go!" }],
};

const UNLOCKS = [
  { icon:'🎬', name:'Plex Movie',      req:5  },
  { icon:'🎮', name:'Nintendo Switch', req:10 },
  { icon:'🍦', name:'Choose Dessert',  req:15 },
  { icon:'📱', name:'iPad Time',       req:20 },
];

const LEVELS = [
  { min:-999, label:'😤 Ninja in Training' },
  { min:0,    label:'⚡ Level 1 Ninja'     },
  { min:5,    label:'🔥 Level 2 Ninja'     },
  { min:10,   label:'🔥🔥 Level 3 Sensei'  },
  { min:15,   label:'🦅 Spinjitzu Master'  },
  { min:20,   label:'🐉 Golden Dragon Master' },
];

// Ninja avatar stages: 0=plain, 1=green fire, 2=big fire, 3=winged, 4=golden dragon
const STAGES = [
  { min:-999, stage:0, body:'🥷',  sub:'THE GREEN NINJA',   golden:false },
  { min:0,    stage:0, body:'🥷',  sub:'THE GREEN NINJA',   golden:false },
  { min:5,    stage:1, body:'🥷',  sub:'FIRE NINJA',        golden:false },
  { min:10,   stage:2, body:'🥷',  sub:'FLAME NINJA',       golden:false },
  { min:15,   stage:3, body:'🥷',  sub:'WINGED NINJA',      golden:false },
  { min:20,   stage:4, body:'🐉',  sub:'GOLDEN DRAGON',     golden:true  },
];

let state = {};
try { state = JSON.parse(localStorage.getItem('sebyTrustV5') || '{}'); } catch(e) {}
DAYS.forEach(d => { if (state[d] === undefined) state[d] = 0; });

const todayIdx = (() => { const d = new Date().getDay(); return d === 0 ? 6 : d-1; })();
let activeIdx = todayIdx;
let lastStage = -1;

function net()    { return DAYS.reduce((s,d)=>s+state[d],0); }
function earned() { return DAYS.reduce((s,d)=>s+Math.max(0,state[d]),0); }
function lost()   { return DAYS.reduce((s,d)=>s+Math.abs(Math.min(0,state[d])),0); }

function tap(delta) {
  state[DAYS[activeIdx]] = (state[DAYS[activeIdx]]||0) + delta;
  save(); render();
}
function resetWeek() {
  DAYS.forEach(d => state[d] = 0);
  save(); render();
}
function save() { try { localStorage.setItem('sebyTrustV5', JSON.stringify(state)); } catch(e){} }

function getStageData(n) {
  return [...STAGES].reverse().find(s => n >= s.min) || STAGES[1];
}

function renderAvatar(n) {
  const sd = getStageData(n);
  const ninjaStage = document.getElementById('ninjaStage');
  const ninjaBody  = document.getElementById('ninjaBody');
  const heroSub    = document.getElementById('heroSub');

  // Stage class
  ninjaStage.className = 'ninja-stage stage-' + sd.stage;
  ninjaBody.textContent = sd.body;
  heroSub.textContent   = sd.sub;

  // Golden theme toggle
  if (sd.golden && !document.body.classList.contains('golden')) {
    document.body.classList.add('golden');
    // Flash effect
    const ov = document.getElementById('dragonOverlay');
    ov.classList.remove('flash');
    void ov.offsetWidth; // reflow
    ov.classList.add('flash');
  } else if (!sd.golden) {
    document.body.classList.remove('golden');
  }
}

function renderScore() {
  const n = net();
  const el = document.getElementById('scoreNum');
  el.textContent = (n > 0 ? '+' : '') + n;
  el.className = 'score-num ' + (n > 0 ? 'pos' : n < 0 ? 'neg' : 'zero');
  document.getElementById('tallyPlus').textContent  = '▲ ' + earned() + ' earned';
  document.getElementById('tallyMinus').textContent = '▼ ' + lost()   + ' lost';
  const level = [...LEVELS].reverse().find(l => n >= l.min);
  document.getElementById('levelPill').textContent = level.label;
  renderAvatar(n);
}

function renderStrip() {
  const c = document.getElementById('weekStrip');
  c.innerHTML = '';
  DAYS.forEach((d,i) => {
    const v = state[d];
    const cls = ['day-cell', i===activeIdx?'active':'', v>0?'pos':v<0?'neg':''].filter(Boolean).join(' ');
    const valCls = v>0?'pos':v<0?'neg':'zero';
    const dot = CALENDAR[i] ? '<div class="cal-dot"></div>' : '';
    c.innerHTML += `<div class="${cls}" onclick="setDay(${i})">
      <div class="day-name">${d}</div>
      <div class="day-val ${valCls}">${v===0?'·':(v>0?'+'+v:v)}</div>
      ${dot}
    </div>`;
  });
}

function setDay(i) { activeIdx=i; render(); }

function renderCal() {
  const sec = document.getElementById('calSection');
  const evs = CALENDAR[activeIdx];
  if (!evs) { sec.className='cal-section'; return; }
  sec.className='cal-section show';
  sec.innerHTML = evs.map(ev=>`
    <div class="cal-event">
      <div class="cal-icon">${ev.icon}</div>
      <div><div class="cal-name">${ev.name}</div><div class="cal-time">${ev.sub}</div></div>
    </div>`).join('');
}

function renderUnlocks() {
  const n = net();
  document.getElementById('unlocksGrid').innerHTML = UNLOCKS.map(u => {
    const ok = n >= u.req;
    return `<div class="unlock-card${ok?' earned':''}">
      <div class="lock-veil">🔒</div>
      <div class="unlock-icon">${u.icon}</div>
      <div class="unlock-name">${u.name}</div>
      <div class="unlock-pts">${ok ? '✅ Unlocked!' : u.req+' pts needed'}</div>
      ${!ok ? `<div class="unlock-progress">${Math.max(0,n)} / ${u.req}</div>` : ''}
    </div>`;
  }).join('');
}

function render() { renderScore(); renderStrip(); renderCal(); renderUnlocks(); }
render();
</script>
</body>
</html>
