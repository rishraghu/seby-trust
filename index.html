<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seby — Trust Points</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:#0b0f0b; --surface:#111911; --surface2:#162016; --border:#1e2e1e;
  --primary:#22c55e; --pdim:#166534; --acid:#a3e635;
  --glow:rgba(34,197,94,0.35); --gold:#eab308; --gold-dim:#713f12;
  --red:#ef4444; --red-dim:#7f1d1d; --red-glow:rgba(239,68,68,0.25);
  --text:#f0fdf0; --muted:#4b6650;
  --score-col:#22c55e; --score-glow:rgba(34,197,94,0.35);
  --scales:rgba(34,197,94,0.04);
}
body.golden {
  --bg:#0d0900; --surface:#1a1000; --surface2:#221500; --border:#3d2800;
  --primary:#eab308; --pdim:#713f12; --acid:#fde047;
  --glow:rgba(234,179,8,0.45); --gold:#fde047; --gold-dim:#92400e;
  --text:#fefce8; --muted:#92620a;
  --score-col:#fde047; --score-glow:rgba(253,224,71,0.5);
  --scales:rgba(234,179,8,0.06);
}
body.golden .btn-plus  { border-color:#713f12 !important; color:#eab308 !important; }
body.golden .tally-plus{ color:#eab308 !important; border-color:#713f12 !important; }

body { background:var(--bg); color:var(--text); font-family:'Nunito',sans-serif; min-height:100vh; display:flex; justify-content:center; padding:0 0 48px; transition:background .8s; }
.app { width:100%; max-width:440px; }

/* HEADER */
.header { position:relative; overflow:hidden; padding:28px 24px 20px; text-align:center; background:var(--surface); border-bottom:2px solid var(--border); transition:background .8s,border-color .8s; }
.scales { position:absolute; inset:0; pointer-events:none;
  background-image:repeating-linear-gradient(120deg,transparent 0,transparent 18px,var(--scales) 18px,var(--scales) 20px),
                   repeating-linear-gradient(60deg,transparent 0,transparent 18px,var(--scales) 18px,var(--scales) 20px); }
.ninja-wrap  { position:relative; display:inline-block; line-height:1; margin-bottom:4px; }
.ninja-aura  { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); border-radius:50%; pointer-events:none; z-index:1; width:0; height:0; opacity:0; transition:all .6s; }
.ninja-wings { position:absolute; top:50%; left:50%; transform:translate(-50%,-46%); font-size:0; opacity:0; pointer-events:none; z-index:1; transition:font-size .5s,opacity .5s; }
.ninja-fx    { position:absolute; top:-10px; left:50%; transform:translateX(-50%); font-size:0; opacity:0; white-space:nowrap; pointer-events:none; z-index:3; transition:font-size .4s,opacity .4s; }
.ninja-crown { position:absolute; top:-14px; left:50%; transform:translateX(-50%); font-size:0; opacity:0; pointer-events:none; z-index:4; transition:font-size .4s,opacity .4s; }
.ninja-body  { font-size:72px; display:block; position:relative; z-index:2; animation:bob 3.5s ease-in-out infinite; transition:filter .6s; }

.stage-1 .ninja-body  { filter:drop-shadow(0 0 12px rgba(34,197,94,.75)); }
.stage-1 .ninja-fx    { font-size:20px; opacity:1; }
.stage-1 .ninja-aura  { width:92px; height:92px; opacity:1; background:radial-gradient(circle,rgba(34,197,94,.22) 0%,transparent 70%); }
.stage-2 .ninja-body  { filter:drop-shadow(0 0 20px rgba(34,197,94,.95)) drop-shadow(0 0 40px rgba(34,197,94,.4)); }
.stage-2 .ninja-fx    { font-size:28px; opacity:1; animation:flicker 1.1s ease-in-out infinite; }
.stage-2 .ninja-aura  { width:114px; height:114px; opacity:1; background:radial-gradient(circle,rgba(34,197,94,.28) 0%,transparent 70%); animation:pulseaura 2s ease-in-out infinite; }
.stage-3 .ninja-body  { filter:drop-shadow(0 0 20px rgba(234,179,8,.85)) drop-shadow(0 0 40px rgba(34,197,94,.4)); }
.stage-3 .ninja-fx    { font-size:30px; opacity:1; animation:flicker .9s ease-in-out infinite; }
.stage-3 .ninja-wings { font-size:52px; opacity:.85; animation:wingsflap 2s ease-in-out infinite; }
.stage-3 .ninja-aura  { width:132px; height:132px; opacity:1; background:radial-gradient(circle,rgba(234,179,8,.22) 0%,rgba(34,197,94,.1) 55%,transparent 75%); animation:pulseaura 1.5s ease-in-out infinite; }
.stage-4 .ninja-body  { animation:bob-fast 2s ease-in-out infinite,goldpulse 1.5s ease-in-out infinite; }
.stage-4 .ninja-fx    { font-size:34px; opacity:1; animation:flicker .6s ease-in-out infinite; }
.stage-4 .ninja-wings { font-size:66px; opacity:1; animation:wingsflap 1.2s ease-in-out infinite; }
.stage-4 .ninja-crown { font-size:28px; opacity:1; animation:crownrock 3s linear infinite; }
.stage-4 .ninja-aura  { width:164px; height:164px; opacity:1; background:radial-gradient(circle,rgba(253,224,71,.38) 0%,rgba(234,179,8,.16) 55%,transparent 75%); animation:pulseaura 1s ease-in-out infinite; }

@keyframes bob       { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-9px)} }
@keyframes bob-fast  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
@keyframes flicker   { 0%,100%{transform:translateX(-50%) scaleY(1)} 50%{transform:translateX(-50%) scaleY(1.18)} }
@keyframes wingsflap { 0%,100%{transform:translate(-50%,-46%) scaleY(1)} 50%{transform:translate(-50%,-46%) scaleY(.9)} }
@keyframes pulseaura { 0%,100%{opacity:.65} 50%{opacity:1} }
@keyframes crownrock { 0%{transform:translateX(-50%) rotate(-9deg)} 50%{transform:translateX(-50%) rotate(9deg)} 100%{transform:translateX(-50%) rotate(-9deg)} }
@keyframes goldpulse {
  0%,100%{filter:drop-shadow(0 0 28px rgba(253,224,71,1)) drop-shadow(0 0 56px rgba(234,179,8,.6)) sepia(.5) saturate(2) hue-rotate(15deg) brightness(1.3)}
  50%    {filter:drop-shadow(0 0 44px rgba(253,224,71,1)) drop-shadow(0 0 88px rgba(234,179,8,.9)) sepia(.8) saturate(3) hue-rotate(22deg) brightness(1.6)}
}
@keyframes dragonflash { 0%{opacity:0} 10%{opacity:1} 88%{opacity:1} 100%{opacity:0} }

.hero-name { font-family:'Bangers',cursive; font-size:52px; letter-spacing:6px; color:var(--gold); text-shadow:0 2px 0 #000,0 0 24px rgba(234,179,8,.4); line-height:1; margin-top:2px; transition:color .6s; }
.hero-sub  { font-family:'Bangers',cursive; font-size:17px; letter-spacing:4px; color:var(--acid); opacity:.9; margin-top:2px; transition:color .6s; }

/* SCORE */
.score-block { padding:28px 24px 20px; text-align:center; background:var(--bg); transition:background .8s; }
.score-eyebrow { font-size:10px; font-weight:900; letter-spacing:3px; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
.score-num { font-family:'Bangers',cursive; font-size:120px; line-height:.9; display:block; color:var(--score-col); text-shadow:0 0 60px var(--score-glow),0 0 20px var(--score-glow); transition:color .4s,text-shadow .4s; }
.score-num.neg  { color:var(--red);  text-shadow:0 0 60px var(--red-glow),0 0 20px var(--red-glow); }
.score-num.zero { color:var(--gold); text-shadow:0 0 30px rgba(234,179,8,.2); }
.tally-row { display:flex; justify-content:center; gap:20px; margin-top:10px; }
.tally-chip { display:flex; align-items:center; gap:5px; background:var(--surface2); border:1.5px solid; border-radius:20px; padding:4px 12px; font-size:13px; font-weight:900; }
.tally-plus  { color:var(--primary); border-color:var(--pdim); }
.tally-minus { color:var(--red);     border-color:var(--red-dim); }
.level-pill { display:inline-block; margin-top:14px; background:var(--gold-dim); border:2px solid var(--gold); color:var(--gold); font-family:'Bangers',cursive; font-size:15px; letter-spacing:2px; padding:4px 18px; border-radius:100px; transition:all .6s; }

/* MAIN +/- BUTTONS */
.btn-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:0 24px 16px; background:var(--bg); transition:background .8s; }
.trust-btn { height:100px; border-radius:16px; border:3px solid; font-family:'Bangers',cursive; font-size:60px; line-height:1; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; background:transparent; user-select:none; -webkit-tap-highlight-color:transparent; transition:background .15s; }
.trust-btn span { font-family:'Nunito',sans-serif; font-size:10px; font-weight:900; letter-spacing:2px; text-transform:uppercase; margin-top:-2px; }
.btn-minus { border-color:var(--red-dim); color:var(--red); }
.btn-minus:active { background:var(--red-dim); }
.btn-plus  { border-color:var(--pdim); color:var(--primary); }
.btn-plus:active  { background:var(--pdim); }

/* QUICK BONUS BUTTONS */
.quick-label { padding:2px 24px 10px; font-size:10px; font-weight:900; letter-spacing:3px; text-transform:uppercase; color:var(--muted); background:var(--bg); }
.quick-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:0 24px 24px; background:var(--bg); }
.quick-btn {
  border-radius:12px; border:2px solid; padding:12px 10px;
  cursor:pointer; display:flex; align-items:center; gap:10px;
  background:transparent; user-select:none; -webkit-tap-highlight-color:transparent;
  transition:background .15s, opacity .2s;
  position:relative; overflow:hidden;
}
.quick-btn.used { opacity:.45; cursor:pointer; }
.quick-btn.used::after { content:'✓ TAP TO UNDO'; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:'Bangers',cursive; font-size:13px; letter-spacing:2px; background:rgba(0,0,0,.6); border-radius:10px; color:#aaa; }
.quick-btn.pos-btn { border-color:var(--pdim); color:var(--primary); }
.quick-btn.neg-btn { border-color:var(--red-dim); color:var(--red); }
.quick-btn.pos-btn:not(.used):active { background:var(--pdim); }
.quick-btn.neg-btn:not(.used):active { background:var(--red-dim); }
.qb-icon { font-size:26px; flex-shrink:0; }
.qb-info { flex:1; text-align:left; }
.qb-name { font-size:13px; font-weight:900; }
.qb-pts  { font-family:'Bangers',cursive; font-size:15px; letter-spacing:1px; margin-top:1px; }
.qb-pts.pos { color:var(--primary); }
.qb-pts.neg { color:var(--red); }

/* DIVIDER */
.divider { height:2px; margin:0 24px; background:var(--border); border-radius:2px; transition:background .6s; }

/* WEEK STRIP */
.week-label { padding:18px 24px 10px; font-size:10px; font-weight:900; letter-spacing:3px; text-transform:uppercase; color:var(--muted); background:var(--bg); }
.week-strip { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; padding:0 24px 24px; background:var(--bg); }
.day-cell { background:var(--surface2); border:2px solid var(--border); border-radius:10px; padding:8px 4px 6px; text-align:center; cursor:pointer; transition:border-color .2s; }
.day-cell.active      { border-color:var(--acid); }
.day-cell.day-pos     { border-color:var(--pdim); }
.day-cell.day-neg     { border-color:var(--red-dim); }
.day-cell.active.day-pos { border-color:var(--primary); }
.day-cell.active.day-neg { border-color:var(--red); }
.day-name { font-size:9px; font-weight:900; letter-spacing:1px; text-transform:uppercase; color:var(--muted); }
.day-val  { font-family:'Bangers',cursive; font-size:20px; line-height:1.1; margin-top:2px; color:var(--border); }
.day-val.vpos { color:var(--primary); }
.day-val.vneg { color:var(--red); }
.cal-dot  { width:5px; height:5px; border-radius:50%; background:var(--acid); margin:3px auto 0; }

/* CALENDAR */
.cal-section { padding:0 24px 20px; background:var(--bg); display:none; }
.cal-section.show { display:block; }
.cal-event { display:flex; align-items:center; gap:12px; background:var(--surface2); border:2px solid #1e3a5f; border-radius:12px; padding:10px 14px; margin-bottom:8px; }
.cal-icon { font-size:24px; }
.cal-name { font-size:14px; font-weight:900; color:#7dd3fc; }
.cal-time { font-size:11px; color:#4a7fa0; font-weight:800; margin-top:1px; }

/* UNLOCKS */
.unlocks-wrap  { background:var(--bg); padding-bottom:4px; }
.unlocks-label { padding:14px 24px 12px; font-size:10px; font-weight:900; letter-spacing:3px; text-transform:uppercase; color:var(--muted); }
.unlocks-grid  { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:0 24px 24px; }
.unlock-card { background:var(--surface2); border:2px solid var(--border); border-radius:12px; padding:14px 10px; text-align:center; position:relative; overflow:hidden; transition:border-color .3s,background .6s; }
.unlock-card.earned { border-color:var(--gold); background:#1c1600; }
.lock-veil { position:absolute; inset:0; background:rgba(0,0,0,.62); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:24px; }
.unlock-card.earned .lock-veil { display:none; }
.unlock-icon { font-size:34px; }
.unlock-name { font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:.5px; color:#555; margin-top:5px; }
.unlock-card.earned .unlock-name { color:var(--gold); }
.unlock-pts  { font-family:'Bangers',cursive; font-size:12px; color:#333; margin-top:2px; }
.unlock-card.earned .unlock-pts  { color:var(--primary); }
.unlock-prog { font-family:'Bangers',cursive; font-size:12px; color:var(--muted); margin-top:2px; }

/* RESET */
.reset-row { padding:0 24px 8px; background:var(--bg); }
.reset-btn { width:100%; background:transparent; border:2px solid var(--border); color:var(--muted); font-family:'Bangers',cursive; font-size:16px; letter-spacing:3px; padding:10px; border-radius:10px; cursor:pointer; transition:border-color .2s,color .2s; }
.reset-btn:active { border-color:var(--red); color:var(--red); }
.footer-txt { text-align:center; font-size:10px; font-weight:900; letter-spacing:3px; text-transform:uppercase; color:var(--border); padding:12px 0 0; background:var(--bg); }

/* DRAGON OVERLAY */
.dragon-overlay { position:fixed; inset:0; pointer-events:none; z-index:999; background:radial-gradient(circle,rgba(253,224,71,.88) 0%,rgba(234,179,8,.55) 40%,transparent 70%); opacity:0; }
.dragon-overlay.flash { animation:dragonflash 1.6s ease forwards; }
</style>
</head>
<body>
<div class="dragon-overlay" id="dragonOverlay"></div>
<div class="app">

  <div class="header">
    <div class="scales"></div>
    <div class="ninja-wrap stage-0" id="ninjaStage">
      <div class="ninja-aura"></div>
      <span class="ninja-wings">🪽</span>
      <span class="ninja-fx">🔥🔥🔥</span>
      <span class="ninja-crown">✨</span>
      <span class="ninja-body" id="ninjaBody">🥷</span>
    </div>
    <div class="hero-name">SEBY</div>
    <div class="hero-sub" id="heroSub">THE GREEN NINJA</div>
  </div>

  <div class="score-block">
    <div class="score-eyebrow">Weekly Trust Points</div>
    <span class="score-num zero" id="scoreNum">0</span>
    <div class="tally-row">
      <div class="tally-chip tally-plus"  id="tallyPlus">▲ 0 earned</div>
      <div class="tally-chip tally-minus" id="tallyMinus">▼ 0 lost</div>
    </div>
    <div class="level-pill" id="levelPill">⚡ Level 1 Ninja</div>
  </div>

  <!-- MAIN BUTTONS -->
  <div class="btn-row">
    <div class="trust-btn btn-minus" onclick="tap(-1)">−<span>Trust Lost</span></div>
    <div class="trust-btn btn-plus"  onclick="tap(+1)">+<span>Trust Earned</span></div>
  </div>

  <!-- QUICK BUTTONS -->
  <div class="quick-label">Quick Add — Today</div>
  <div class="quick-grid" id="quickGrid"></div>

  <div class="divider"></div>

  <div class="week-label">This Week</div>
  <div class="week-strip" id="weekStrip"></div>
  <div class="cal-section" id="calSection"></div>

  <div class="divider"></div>

  <div class="unlocks-wrap">
    <div class="unlocks-label">Ninja Unlocks</div>
    <div class="unlocks-grid" id="unlocksGrid"></div>
  </div>

  <div class="reset-row">
    <button class="reset-btn" onclick="resetWeek()">↺ Reset Week</button>
  </div>
  <div class="footer-txt">Spinjitzu Training In Progress</div>

</div>
<script>
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

const CALENDAR = {
  1:[{icon:'🦾',name:'OT — Monique',   sub:'Occupational Therapy'}],
  3:[{icon:'🗣️',name:'Speech Therapy', sub:'Speech & Literacy'}],
  4:[{icon:'⚽',name:'Soccer Training',sub:'Get your boots ready!'}],
  5:[{icon:'⚽',name:'Soccer Match',   sub:"Game day — let's go!"}],
};

const UNLOCKS = [
  {icon:'🎬',name:'Plex Movie',      req:5 },
  {icon:'🎮',name:'Nintendo Switch', req:10},
  {icon:'📱',name:'iPad Time',       req:15},
  {icon:'🎨',name:'Pick New Theme',  req:20},
];

// Quick buttons — positive pts = earned, negative = lost
const QUICK = [
  {id:'homework',  icon:'📚', name:'Homework',     pts:+2, pos:true },
  {id:'ready',     icon:'🎒', name:'Getting Ready', pts:+1, pos:true },
  {id:'behaviour', icon:'⭐', name:'Good Behaviour', pts:+1, pos:true },
  {id:'sleep',     icon:'😴', name:'Sleep',         pts:+5, pos:true },
];

const STAGES = [
  {min:-999,stage:0,body:'🥷',sub:'THE GREEN NINJA',golden:false},
  {min:0,   stage:0,body:'🥷',sub:'THE GREEN NINJA',golden:false},
  {min:5,   stage:1,body:'🥷',sub:'FIRE NINJA',     golden:false},
  {min:10,  stage:2,body:'🥷',sub:'FLAME NINJA',    golden:false},
  {min:13,  stage:3,body:'🥷',sub:'WINGED NINJA',   golden:false},
  {min:15,  stage:3,body:'🥷',sub:'WINGED NINJA',   golden:false},
  {min:20,  stage:4,body:'🐉',sub:'GOLDEN DRAGON',  golden:true },
];

const LEVELS = [
  {min:-999,label:'😤 Ninja in Training'},
  {min:0,   label:'⚡ Level 1 Ninja'},
  {min:5,   label:'🔥 Level 2 Ninja'},
  {min:10,  label:'🔥🔥 Level 3 Sensei'},
  {min:13,  label:'🦅 Spinjitzu Master'},
  {min:15,  label:'🦅 Spinjitzu Master'},
  {min:20,  label:'🐉 Golden Dragon Master'},
];

// ── STATE ──────────────────────────────────────────────────────────────
// scores: { Mon: 2, Tue: -1, ... }
// used:   { '2024-06-24': { homework: true, sleep: true, ... } }
let scores = Object.fromEntries(DAYS.map(d=>[d,0]));
let used   = {};

// used is keyed by day name: { Mon: { homework: true }, Tue: {} ... }

try {
  const s = JSON.parse(localStorage.getItem('sebyScores') || '{}');
  DAYS.forEach(d => { scores[d] = s[d] ?? 0; });
} catch(e) {}
try {
  used = JSON.parse(localStorage.getItem('sebyUsed') || '{}');
  DAYS.forEach(d => { if (!used[d]) used[d] = {}; });
} catch(e) {
  used = Object.fromEntries(DAYS.map(d=>[d,{}]));
}

const todayIdx = (() => { const d=new Date().getDay(); return d===0?6:d-1; })();
let activeDay  = todayIdx;
let wasGolden  = false;

function net()    { return DAYS.reduce((s,d)=>s+scores[d],0); }
function earned() { return DAYS.reduce((s,d)=>s+Math.max(0,scores[d]),0); }
function lost()   { return DAYS.reduce((s,d)=>s+Math.abs(Math.min(0,scores[d])),0); }
function getStage(n){ return [...STAGES].reverse().find(s=>n>=s.min); }
function getLevel(n){ return [...LEVELS].reverse().find(l=>n>=l.min); }

function saveAll() {
  try { localStorage.setItem('sebyScores', JSON.stringify(scores)); } catch(e){}
  try { localStorage.setItem('sebyUsed',   JSON.stringify(used));   } catch(e){}
}

function tap(delta) {
  scores[DAYS[activeDay]] = (scores[DAYS[activeDay]]||0) + delta;
  saveAll(); render();
}

function tapQuick(id, pts) {
  const dk = DAYS[activeDay];
  if (!used[dk]) used[dk] = {};
  if (used[dk][id]) {
    // untick — reverse the points
    used[dk][id] = false;
    scores[dk] = (scores[dk]||0) - pts;
  } else {
    // tick — add the points
    used[dk][id] = true;
    scores[dk] = (scores[dk]||0) + pts;
  }
  saveAll(); render();
}

function resetWeek() {
  DAYS.forEach(d=>{ scores[d]=0; });
  used = Object.fromEntries(DAYS.map(d=>[d,{}]));
  saveAll(); render();
}

function render() {
  const n  = net();
  const sd = getStage(n);
  const lv = getLevel(n);
  const tk = DAYS[activeDay];

  // Score
  const sEl = document.getElementById('scoreNum');
  sEl.textContent = (n>0?'+':'') + n;
  sEl.className = 'score-num' + (n>0?'':n<0?' neg':' zero');
  document.getElementById('tallyPlus').textContent  = '▲ '+earned()+' earned';
  document.getElementById('tallyMinus').textContent = '▼ '+lost()+' lost';
  document.getElementById('levelPill').textContent  = lv.label;

  // Avatar
  document.getElementById('ninjaStage').className = 'ninja-wrap stage-'+sd.stage;
  document.getElementById('ninjaBody').textContent = sd.body;
  document.getElementById('heroSub').textContent   = sd.sub;

  // Golden theme
  if (sd.golden && !wasGolden) {
    document.body.classList.add('golden');
    const ov = document.getElementById('dragonOverlay');
    ov.classList.remove('flash'); void ov.offsetWidth; ov.classList.add('flash');
  } else if (!sd.golden) { document.body.classList.remove('golden'); }
  wasGolden = sd.golden;

  // Quick buttons
  const qg = document.getElementById('quickGrid');
  qg.innerHTML = '';
  QUICK.forEach(q => {
    const isUsed = used[tk]?.[q.id] === true;
    const cls = `quick-btn ${q.pos?'pos-btn':'neg-btn'}${isUsed?' used':''}`;
    const ptsLabel = (q.pts>0?'+':'')+q.pts+' pts';
    qg.innerHTML += `<div class="${cls}" onclick="tapQuick('${q.id}',${q.pts})">
      <div class="qb-icon">${q.icon}</div>
      <div class="qb-info">
        <div class="qb-name">${q.name}</div>
        <div class="qb-pts ${q.pos?'pos':'neg'}">${ptsLabel}</div>
      </div>
    </div>`;
  });

  // Week strip
  const strip = document.getElementById('weekStrip');
  strip.innerHTML = '';
  DAYS.forEach((d,i) => {
    const v = scores[d];
    const cls = ['day-cell', i===activeDay?'active':'', v>0?'day-pos':v<0?'day-neg':''].filter(Boolean).join(' ');
    const dot = CALENDAR[i] ? '<div class="cal-dot"></div>' : '';
    strip.innerHTML += `<div class="${cls}" onclick="setDay(${i})">
      <div class="day-name">${d}</div>
      <div class="day-val ${v>0?'vpos':v<0?'vneg':''}">${v===0?'·':v>0?'+'+v:v}</div>
      ${dot}
    </div>`;
  });

  // Calendar events
  const cal = document.getElementById('calSection');
  const evs = CALENDAR[activeDay];
  if (evs) {
    cal.className = 'cal-section show';
    cal.innerHTML = evs.map(ev=>`<div class="cal-event">
      <div class="cal-icon">${ev.icon}</div>
      <div><div class="cal-name">${ev.name}</div><div class="cal-time">${ev.sub}</div></div>
    </div>`).join('');
  } else { cal.className = 'cal-section'; }

  // Unlocks
  document.getElementById('unlocksGrid').innerHTML = UNLOCKS.map(u => {
    const ok = n >= u.req;
    return `<div class="unlock-card${ok?' earned':''}">
      <div class="lock-veil">🔒</div>
      <div class="unlock-icon">${u.icon}</div>
      <div class="unlock-name">${u.name}</div>
      <div class="unlock-pts">${ok?'✅ Done!':u.req+' pts'}</div>
      ${!ok?`<div class="unlock-prog">${Math.max(0,n)}/${u.req}</div>`:''}
    </div>`;
  }).join('');
}

function setDay(i) { activeDay=i; render(); }
render();
</script>
</body>
</html>
